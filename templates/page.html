<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Discussion Guide — Blackhawk Church</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600;8..60,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f13;
      --surface: #15171d;
      --card: #1a1d25;
      --card-hover: #1f222c;
      --text: #dfe3ec;
      --text-secondary: #8b92a5;
      --accent: #5b8def;
      --accent-dim: rgba(91, 141, 239, 0.12);
      --border: #22262f;
      --border-light: #2a2e3a;
      --danger: #e5574f;
      --danger-dim: rgba(229, 87, 79, 0.12);
      --custom: #9b7aed;
      --custom-dim: rgba(155, 122, 237, 0.12);
      --edited: #d4943a;
      --edited-dim: rgba(212, 148, 58, 0.12);
      --section: #3dae8e;
      --section-dim: rgba(61, 174, 142, 0.12);
      --success: #3dae8e;
      --radius: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font: 15px/1.6 'Outfit', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== LAYOUT ===== */
    .wrap {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 20px 100px;
    }

    /* ===== HERO HEADER ===== */
    .hero {
      position: relative;
      margin: 0 -20px 32px;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      overflow: hidden;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px 24px 22px;
      background: var(--surface);
    }

    .hero-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.35;
      z-index: 0;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
      line-height: 1.25;
    }

    .sermon-title {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 16px;
      font-weight: 300;
      font-style: italic;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 4px;
      letter-spacing: 0.2px;
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .hero-meta a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .hero-meta a:hover { text-decoration: underline; }

    /* ===== TOOLBAR ===== */
    /* ===== ACTION BAR (search + load + menu) ===== */
    .action-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      position: relative;
      height: 38px;
    }

    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      width: 50%;
      min-width: 160px;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-wrap.expanded {
      width: 100%;
    }

    .search-wrap input {
      width: 100%;
      padding-right: 36px;
    }

    .search-clear {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 4px 6px;
      font-size: 12px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    .search-wrap.expanded .search-clear {
      opacity: 1;
      pointer-events: auto;
    }

    .search-clear:hover {
      background: var(--surface);
      color: var(--text);
    }

    .action-buttons {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: right center;
    }

    .action-buttons.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(20px);
      position: absolute;
      right: 0;
    }

    .filter-count {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .spacer { flex: 1; }

    input[type="text"], select, textarea {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      outline: none;
      font: inherit;
      font-size: 14px;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }

    select { cursor: pointer; }

    button {
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: var(--surface);
      color: var(--text);
    }

    .btn-icon {
      background: transparent;
      color: var(--text-secondary);
      border: none;
      padding: 6px;
      border-radius: var(--radius);
      line-height: 1;
    }
    .btn-icon:hover {
      background: var(--surface);
      color: var(--text);
    }
    .btn-icon svg { width: 18px; height: 18px; display: block; }

    .btn-danger { color: var(--danger); }
    .btn-danger:hover { background: var(--danger-dim); color: var(--danger); }

    /* ===== COLLAPSIBLE SECTIONS ===== */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-secondary);
      margin: 24px 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    /* ===== SEARCH (integrated into action bar) ===== */

    /* ===== ADD FORM ===== */
    .add-form {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .add-form textarea {
      flex: 1;
      min-width: 200px;
      resize: none;
      overflow: hidden;
      min-height: 38px;
      line-height: 1.5;
    }

    #newTitle { display: none; }
    #newTitle.visible { display: block; min-width: 160px; }

    /* ===== BOARD HEADERS ===== */
    .board-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      cursor: pointer;
      user-select: none;
    }

    .board-header:hover { opacity: 0.8; }

    .board-toggle {
      font-size: 10px;
      color: var(--text-secondary);
      transition: transform 0.2s;
    }

    .board-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .board-count {
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--surface);
      padding: 1px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .board-wrap.collapsed .board-toggle { transform: rotate(-90deg); }
    .board-wrap.collapsed .board { display: none; }

    .board { min-height: 8px; }
    .board-muted .card { opacity: 0.6; }
    .board-muted .card:hover { opacity: 0.85; }

    /* ===== CARDS ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin: 6px 0;
      transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
      position: relative;
    }

    .card:hover {
      background: var(--card-hover);
    }

    /* Left accent strip */
    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--accent);
      opacity: 0.7;
    }

    .card.custom-card::before { background: var(--custom); }
    .card.section-card::before { background: var(--section); }
    .card.edited-card::before { background: var(--edited); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 0 16px;
    }

    .drag-handle {
      cursor: grab;
      user-select: none;
      color: var(--text-secondary);
      opacity: 0.35;
      transition: opacity 0.15s;
      font-size: 14px;
      line-height: 1;
      padding: 2px;
    }

    .card:hover .drag-handle { opacity: 0.6; }
    .drag-handle:active { cursor: grabbing; }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      background: var(--accent-dim);
      color: var(--accent);
    }

    .tag.custom { background: var(--custom-dim); color: var(--custom); }
    .tag.edited { background: var(--edited-dim); color: var(--edited); }
    .tag.section { background: var(--section-dim); color: var(--section); }

    .edited-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 3px;
      background: var(--edited);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .card-body {
      padding: 8px 14px 12px 16px;
      font-size: 14.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      color: var(--text);
    }

    .section-card .card-body {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 15px;
      font-weight: 400;
    }

    /* Card action buttons */
    .card-actions {
      display: flex;
      gap: 2px;
      margin-left: auto;
    }

    /* Drag states */
    .ghost { opacity: 0.3; }
    .sortable-chosen {
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: scale(1.01);
      z-index: 100;
    }
    .sortable-drag { opacity: 0.9; }

    .card.filtered { display: none; }

    /* ===== EDIT MODE ===== */
    .card.editing .card-body { display: none; }
    .card:not(.editing) .edit-area { display: none; }

    .edit-area {
      padding: 8px 14px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .edit-area textarea {
      min-height: 80px;
      resize: vertical;
      font-size: 14px;
    }

    .edit-controls {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    /* ===== BIBLE VERSES ===== */
    .card-verses {
      border-top: 1px solid var(--border);
    }

    .verses-header {
      padding: 8px 14px 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
    }

    .verses-header:hover { background: rgba(91, 141, 239, 0.04); }

    .verses-icon { font-size: 14px; }
    .verses-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex: 1;
    }

    .verses-toggle {
      font-size: 10px;
      color: var(--text-secondary);
      transition: transform 0.2s;
    }

    .verses-content {
      padding: 0 14px 0 16px;
      max-height: 0;
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .verses-content.visible { max-height: 2000px; padding-bottom: 12px; }

    .verse-block { margin-bottom: 12px; }
    .verse-block:last-child { margin-bottom: 0; }

    .verse-reference {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .verse-text {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text);
      font-style: italic;
      padding-left: 12px;
      border-left: 2px solid var(--border-light);
      opacity: 0.85;
    }

    .verse-loading { font-size: 12px; color: var(--text-secondary); font-style: italic; }
    .verse-error { font-size: 12px; color: var(--danger); font-style: italic; }

    /* ===== MENU ===== */
    .menu-toggle { position: relative; }

    .menu-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 4px;
      display: none;
      flex-direction: column;
      min-width: 190px;
      z-index: 1000;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .menu-dropdown.visible { display: flex; }

    .menu-dropdown button {
      background: transparent;
      color: var(--text);
      border: none;
      padding: 10px 12px;
      text-align: left;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 400;
      justify-content: flex-start;
    }

    .menu-dropdown button:hover { background: var(--card); }
    .menu-dropdown button.btn-danger { color: var(--danger); }
    .menu-dropdown button.btn-danger:hover { background: var(--danger-dim); }

    /* ===== KEYBOARD SHORTCUTS ===== */
    .shortcuts-help {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: none;
      max-width: 280px;
      z-index: 1000;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .shortcuts-help.visible { display: block; }

    .shortcuts-help h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .shortcut {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .key {
      background: var(--card);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .shortcuts-help .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 2px;
      font-size: 16px;
    }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: toastIn 0.25s ease;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .toast.success { border-color: rgba(61,174,142,0.3); }
    .toast.success::before { content: '✓'; color: var(--success); font-weight: bold; font-size: 14px; }
    .toast.warning { border-color: rgba(212,148,58,0.3); }
    .toast.warning::before { content: '!'; color: var(--edited); font-weight: bold; font-size: 14px; }
    .toast.hiding { animation: toastOut 0.2s ease forwards; }

    @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
    }

    .empty-state svg {
      width: 56px;
      height: 56px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 18px;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .empty-state p {
      font-size: 13px;
      margin-bottom: 16px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .footer {
      margin-top: 20px;
      color: var(--text-secondary);
      font-size: 12px;
      opacity: 0.5;
    }

    /* ===== ROOM PICKER ===== */
    .room-picker {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .room-display, .room-create {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .room-picker select {
      min-width: 140px;
    }

    .room-create input {
      min-width: 160px;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .wrap { padding: 0 14px 80px; }
      .hero { margin: 0 -14px 24px; padding: 24px 18px 18px; }
      .hero h1 { font-size: 22px; }
      .card-body { font-size: 14px; }
      input[type="text"], select { font-size: 16px; }
      .shortcuts-help { right: 10px; bottom: 10px; max-width: calc(100vw - 40px); }
      .toast-container { left: 14px; right: 14px; transform: none; }
      .toast { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- ===== HERO ===== -->
    <div class="hero" id="hero">
      <img class="hero-image" id="heroImage" src="" alt="" style="display:none" />
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>Discussion Guide</h1>
        <div id="sermonTitle" class="sermon-title" style="display:none"></div>
        <div class="hero-meta">
          <span>Blackhawk Church</span>
          <span id="sermonDate"></span>
          <a id="pdfLink" href="#" target="_blank" rel="noopener" style="display:none">Open PDF</a>
        </div>
      </div>
    </div>

    <!-- ===== ROOM PICKER ===== -->
    <div class="room-picker" id="roomPicker">
      <div class="room-display" id="roomDisplay">
        <select id="roomSelect" title="Rooms"></select>
        <button class="btn-ghost" id="roomCreateBtn">Create New</button>
      </div>
      <div class="room-create" id="roomCreate" style="display:none">
        <input id="roomInput" type="text" placeholder="Room name…" />
        <button class="btn-primary" id="createJoinBtn">Join</button>
        <button class="btn-ghost" id="roomCancelBtn">Cancel</button>
      </div>
    </div>

    <!-- ===== ACTION BAR ===== -->
    <div class="action-bar" id="actionBar">
      <div class="search-wrap" id="searchWrap">
        <input id="searchInput" type="text" placeholder="Search questions…" />
        <button class="search-clear" id="clearSearchBtn">&times;</button>
      </div>
      <span class="filter-count" id="filterCount"></span>
      <div class="action-buttons" id="actionButtons">
        <button class="btn-ghost" id="loadLatestBtn">Load Sermon</button>
        <div class="menu-toggle">
          <button class="btn-icon" id="menuToggle" title="More">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
          <div class="menu-dropdown" id="menuDropdown">
            <button id="shareBtn">Copy share link</button>
            <button id="refreshBtn">Refresh guide</button>
            <button id="helpBtn">Keyboard shortcuts</button>
            <button id="deleteRoomBtn" class="btn-danger">Delete room</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== ADD ===== -->
    <details class="add-section" style="margin-bottom:16px">
      <summary style="cursor:pointer;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);padding:6px 0;list-style:none;display:flex;align-items:center;gap:6px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Custom
      </summary>
      <div class="panel" style="margin-top:6px">
        <div class="add-form">
          <select id="newType">
            <option value="question">Question</option>
            <option value="section">Section</option>
          </select>
          <input id="newTitle" type="text" placeholder="Section title" />
          <textarea id="newText" placeholder="Type here…" rows="1"></textarea>
          <button class="btn-primary" id="addBtn">Add</button>
        </div>
      </div>
    </details>

    <!-- ===== BOARDS ===== -->
    <div class="boards">
      <div class="board-wrap" id="activeWrap">
        <div class="board-header" data-board="active">
          <span class="board-toggle">▾</span>
          <span class="board-title">Active</span>
          <span class="board-count" id="activeCount">0</span>
        </div>

    function detectVerseReferences(text) {
      const pattern = /\b((?:1|2|3)\s+)?([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?\.?)\s+(\d+):(\d+)(?:-(\d+))?\b/gi;
      const references = [];
      const seen = new Set();
      let match;
      while ((match = pattern.exec(text)) !== null) {
        const prefix = match[1] ? match[1].trim() + ' ' : '';
        const bookRaw = match[2].replace(/\.$/, '');
        const chapter = match[3];
        const verseStart = match[4];
        const verseEnd = match[5] || verseStart;
        let bookKey = (prefix + bookRaw).toLowerCase();
        let normalizedBook = bookMappings[bookKey];
        if (!normalizedBook && bookRaw.includes(' ')) {
          const words = bookRaw.split(/\s+/);
          bookKey = (prefix + words[words.length - 1]).toLowerCase();
          normalizedBook = bookMappings[bookKey];
        }
        if (!normalizedBook) continue;
        const reference = `${normalizedBook} ${chapter}:${verseStart}${verseEnd !== verseStart ? '-' + verseEnd : ''}`;
        const key = reference.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          references.push({ reference, apiReference: `${normalizedBook}+${chapter}:${verseStart}-${verseEnd}` });
        }
      }
      return references;
    }

    async function fetchVerse(apiReference) {
      if (verseCache[apiReference]) return verseCache[apiReference];
      try {
        const query = apiReference.replace(/\+/g, ' ');
        const response = await fetch(`${ESV_WORKER_URL}?q=${encodeURIComponent(query)}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const result = { text: data.passages[0].trim(), reference: query };
        verseCache[apiReference] = result;
        return result;
      } catch (error) {
        console.error('Error fetching verse:', error);
        return { error: true, message: 'Unable to load verse' };
      }
    }

      edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`
    };

    // ---- State ----
    let cards = [];
    let currentSermonDate = null;
    const genId = () => "c_" + Math.random().toString(36).slice(2, 9);
    function stableId(text, index) {
      let h = 0x811c9dc5;
      for (let i = 0; i < text.length; i++) { h ^= text.charCodeAt(i); h = Math.imul(h, 0x01000193); }
      return "s_" + (h >>> 0).toString(36) + "_" + index;
    }
    let searchQuery = "";

    $newType.addEventListener("change", () => {

      ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    }
    $newText.addEventListener('input', () => autoExpandTextarea($newText));
    $newText.addEventListener('paste', () => setTimeout(() => autoExpandTextarea($newText), 0));

      currentSermonDate = dateStr || null;
      $sermonDate.textContent = dateStr || "";

      if (title) {

    function updateCardCounts() {
      const a = cards.filter(c => c.status === 'active').length;
      const d = cards.filter(c => c.status === 'done').length;
      const x = cards.filter(c => c.status === 'deleted').length;

    }

    function updateFilterCount() {
      if (!searchQuery) { $filterCount.textContent = ""; return; }
      const q = searchQuery.toLowerCase();
      const visible = cards.filter(c => (c.text || "").toLowerCase().includes(q) || (c.title || "").toLowerCase().includes(q)).length;
      $filterCount.textContent = `${visible} of ${cards.length}`;
    }

    function applySearch() {
      const q = searchQuery.toLowerCase();
      document.querySelectorAll(".card").forEach(el => {
        if (!q) { el.classList.remove("filtered"); return; }
        const card = cards.find(c => c.id === el.dataset.id);
        if (!card) { el.classList.add("filtered"); return; }
        const match = (card.text || "").toLowerCase().includes(q) || (card.title || "").toLowerCase().includes(q);
        el.classList.toggle("filtered", !match);
      });
      updateFilterCount();
    }

    async function createVersesSection(text) {
      const refs = detectVerseReferences(text);
      if (refs.length === 0) return null;
      const div = document.createElement("div");
      div.className = "card-verses";
      const header = document.createElement("div");
      header.className = "verses-header";
      header.innerHTML = `<span class="verses-icon">📖</span><span class="verses-title">Verses (${refs.length})</span><span class="verses-toggle">▾</span>`;
      const content = document.createElement("div");
      content.className = "verses-content";
      header.addEventListener("click", () => {
        content.classList.toggle("visible");
        header.querySelector(".verses-toggle").style.transform = content.classList.contains("visible") ? "rotate(0)" : "rotate(-90deg)";
      });
      div.appendChild(header);
      div.appendChild(content);
      for (const ref of refs) {
        const block = document.createElement("div");
        block.className = "verse-block";
        block.innerHTML = `<div class="verse-reference">${ref.reference}</div><div class="verse-text verse-loading">Loading...</div>`;
        content.appendChild(block);
        fetchVerse(ref.apiReference).then(r => {
          const vt = block.querySelector(".verse-text");
          vt.className = r.error ? "verse-text verse-error" : "verse-text";
          vt.textContent = r.error ? r.message : r.text;
        });
      }
      return div;
    }

    async function renderCards(next) {
      cards = next.map(c => ({ status: 'active', source: 'pdf', ...c, id: c.id || genId() }));
      $boardActive.innerHTML = "";
      $boardDone.innerHTML = "";
      $boardDeleted.innerHTML = "";

      for (const c of cards) {
        const el = document.createElement("div");
        el.className = "card";
        el.dataset.id = c.id;

        const isEdited = c.originalText && c.originalText !== c.text;
        const isCustom = c.source === "custom";
        const isSection = c.type === "section";

        if (isCustom) el.classList.add('custom-card');
        if (isSection) el.classList.add('section-card');
        if (isEdited && !isCustom) el.classList.add('edited-card');

        let tagClass = "", tagText = isSection ? "Section" : "Question";
        if (isCustom) { tagClass = "custom"; tagText = isSection ? "Custom Section" : "Custom"; }
        else if (isSection) { tagClass = "section"; }
        else if (isEdited) { tagClass = "edited"; }

        const header = document.createElement("div");
        header.className = "card-header";
        header.innerHTML = `
          <span class="drag-handle">⋮⋮</span>
          <span class="tag ${tagClass}">${tagText}</span>
          ${c.title ? `<strong style="font-size:13px;margin-left:4px">${escapeHtml(c.title)}</strong>` : ""}
          ${isEdited ? '<span class="edited-badge">EDITED</span>' : ''}
          <div class="card-actions">
            ${c.status === 'active' ? `
              <button class="btn-icon" data-action="edit" title="Edit">${ICONS.edit}</button>
              <button class="btn-icon" data-action="complete" title="Complete" style="color:var(--success)">${ICONS.check}</button>
              <button class="btn-icon btn-danger" data-action="trash" title="Delete">${ICONS.trash}</button>
            ` : `
              <button class="btn-icon" data-action="undo" title="Restore">${ICONS.undo}</button>
            `}
          </div>
        `;

        const body = document.createElement("div");
        body.className = "card-body";
        body.textContent = c.text;

        const editArea = document.createElement("div");
        editArea.className = "edit-area";
        editArea.innerHTML = `
          <textarea class="edit-textarea">${escapeHtml(c.text)}</textarea>
          <div class="edit-controls">
            <button class="btn-ghost" data-action="cancel-edit">Cancel</button>
            <button class="btn-primary" data-action="save-edit">Save</button>
          </div>
        `;

        el.appendChild(header);
        el.appendChild(body);
        el.appendChild(editArea);

        const versesSection = await createVersesSection(c.text);
        if (versesSection) el.appendChild(versesSection);

        if (c.status === "done") $boardDone.appendChild(el);
        else if (c.status === "deleted") $boardDeleted.appendChild(el);
        else $boardActive.appendChild(el);
      }

      updateCardCounts();
      applySearch();
    }

    function getCurrentCards() {
      const byId = Object.fromEntries(cards.map(c => [c.id, c]));
      const read = (container, status) =>
        [...container.querySelectorAll(".card")].map(n => ({ ...byId[n.dataset.id], status }));
      return [...read($boardActive, 'active'), ...read($boardDone, 'done'), ...read($boardDeleted, 'deleted')];

    // ---- Sortable with improved feel ----
    Sortable.create($boardActive, {
      animation: 200,
      handle: ".drag-handle",
      ghostClass: "ghost",
      chosenClass: "sortable-chosen",
      dragClass: "sortable-drag",
      direction: "vertical",
      forceFallback: true,         // bypass native HTML5 DnD for smoother feel
      fallbackTolerance: 3,        // dead-zone before drag starts (prevents accidental drags)
      swapThreshold: 0.55,         // tighter swap zone
      delay: 80,                   // slight delay prevents accidental drags on mobile
      delayOnTouchOnly: true,      // delay only applies on touch devices
      onEnd() { cards = getCurrentCards(); autoSave(); }
    });

    const debounce = (fn, ms = 400) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

    const autoSave = debounce(() => {
      saveLive(getCurrentCards());
    }, 400);

    // ---- Card actions ----
    document.querySelector(".boards").addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const card = btn.closest(".card");
      if (!card) return;
      const id = card.dataset.id;
      const action = btn.dataset.action;

      if (action === "edit") {
        card.classList.add("editing");
        const ta = card.querySelector(".edit-textarea");
        if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
        return;
      }

      if (action === "cancel-edit") {
        card.classList.remove("editing");
        const orig = cards.find(c => c.id === id);
        if (orig) { const ta = card.querySelector(".edit-textarea"); if (ta) ta.value = orig.text; }
        return;
      }

      if (action === "save-edit") {
        const ta = card.querySelector(".edit-textarea");
        if (!ta) return;
        const newText = ta.value.trim();
        if (!newText) { showToast("Card text cannot be empty", "warning"); return; }
        const current = getCurrentCards();
        const next = current.map(c => {
          if (c.id !== id) return c;
          const originalText = c.originalText || (c.source === 'pdf' ? c.text : undefined);
          return { ...c, text: newText, originalText };
        });
        await renderCards(next);
        autoSave();
        showToast("Saved", "success");
        return;
      }

      let newStatus, toastMsg;
      if (action === "complete") { newStatus = "done"; toastMsg = "Completed"; }
      else if (action === "trash") { newStatus = "deleted"; toastMsg = "Deleted"; }
      else if (action === "undo") { newStatus = "active"; toastMsg = "Restored"; }
      else return;

      const next = getCurrentCards().map(c => (c.id === id ? { ...c, status: newStatus } : c));
      await renderCards(next);
      autoSave();
      showToast(toastMsg, action === "trash" ? "warning" : "success");
    });

    // ---- Add card ----
    $("addBtn").addEventListener("click", async () => {
      const type = $newType.value;

      const item = { id: genId(), type, text, status: "active", source: "custom" };

      showToast("Added", "success");

    // ---- Search (expand/collapse) ----
    let _searchExpanded = false;

    function expandSearch() {
      if (_searchExpanded) return;

      if (!_searchExpanded) return;
      _searchExpanded = false;
      $searchWrap.classList.remove("expanded");
      $actionButtons.classList.remove("hidden");
      $searchInput.blur();
    }

    $searchInput.addEventListener("focus", () => expandSearch());

    $searchInput.addEventListener("input", e => {
      searchQuery = e.target.value;
      applySearch();
    });

    $clearSearch.addEventListener("click", () => {
      searchQuery = "";
      $searchInput.value = "";
      applySearch();
      collapseSearch();
    });

    // Collapse on click outside
    document.addEventListener("mousedown", e => {
      if (!_searchExpanded) return;
      if (e.target.closest("#searchWrap") || e.target.closest("#filterCount")) return;
      // Only collapse if search is empty
      if (!$searchInput.value) collapseSearch();
    });

    // Collapse on scroll (with 40px tolerance for incidental thumb movement)
    window.addEventListener("scroll", () => {
      if (!_searchExpanded) return;
      if (Math.abs(window.scrollY - _scrollYOnExpand) > 40) {
        if (!$searchInput.value) collapseSearch();
      }
    }, { passive: true });

    // ---- Keyboard shortcuts ----
    document.addEventListener("keydown", e => {
      if (e.target.matches("input, textarea")) {
        if (e.key === "Escape" && e.target === $searchInput) {
          searchQuery = ""; $searchInput.value = ""; applySearch();
          collapseSearch();
        }
        return;
      }
      if (e.key === "?") { e.preventDefault(); $shortcutsHelp.classList.toggle("visible"); }
      if (e.key === "/") { e.preventDefault(); expandSearch(); }
      if (e.key === "Escape") { e.preventDefault(); $shortcutsHelp.classList.remove("visible"); }
      if (e.key === "n" || e.key === "N") { e.preventDefault(); $newText.focus(); }
    });

    $helpBtn.addEventListener("click", () => $shortcutsHelp.classList.toggle("visible"));
    $closeHelp.addEventListener("click", () => $shortcutsHelp.classList.remove("visible"));

    // ---- Room management ----
    async function refreshRoomsList(selected) {
      const rooms = await listRooms();
      $roomSel.innerHTML = "";
      for (const r of rooms) {
        const opt = document.createElement("option");
        opt.value = r;
        opt.textContent = r;
        $roomSel.appendChild(opt);
      }
      if (selected && rooms.includes(selected)) $roomSel.value = selected;
    }

    async function joinAndLoad(room) {
      await joinRoom(room, () => {
        const state = loadLive();
        renderCards(state);
      });
      await refreshRoomsList(currentRoomCode());
      const state = loadLive();
      renderCards(state);
    }

    const urlRoom = new URLSearchParams(location.search).get("room");
    await joinAndLoad(urlRoom || null);
    await refreshRoomsList(currentRoomCode());

    // ---- Backup recovery ----
    {
      const currentCards = loadLive();
      if (!currentCards || currentCards.length === 0) {
        const backup = loadBackup();
        if (backup && backup.cards && backup.cards.length > 0) {
          const age = Date.now() - (backup.savedAt || 0);
          const ageMin = Math.round(age / 60000);
          const ageLabel = ageMin < 60 ? `${ageMin}m ago` : `${Math.round(ageMin / 60)}h ago`;
          if (confirm(`Board is empty but a backup with ${backup.cards.length} cards exists (${ageLabel}). Restore?`)) {
            await renderCards(backup.cards);
            autoSave();
            showToast(`Restored ${backup.cards.length} cards`, "success");
          }
        }
      }
    }

    // ---- PDF link restore ----
    const savedPdf = loadSavedPdfLink();
    if (savedPdf && savedPdf.url) {
      const isPdf = savedPdf.url.toLowerCase().endsWith(".pdf");
      $pdfLink.textContent = isPdf ? "Open PDF" : "Source";
      $pdfLink.href = savedPdf.url;
      $pdfLink.style.display = "inline-block";
      if (savedPdf.date) updateSermonDate(savedPdf.date);
      if (savedPdf.title) updateSermonTitle(savedPdf.title);
    }

    // ---- Hero image ----
    function loadHeroImage() {
      try {
        const url = new URL("data/hero.webp", location.href);
        const img = new Image();
        img.onload = () => { $heroImage.src = url.toString(); $heroImage.style.display = "block"; };
        img.onerror = () => {}; // no hero image, that's fine
        img.src = url.toString();
      } catch {}
    }
    loadHeroImage();

    // ---- Room picker toggle ----
    $roomCreateBtn.addEventListener("click", () => {
      $roomDisplay.style.display = "none";
      $roomCreate.style.display = "flex";
      $roomInp.value = "";
      $roomInp.focus();
    });

    $roomCancelBtn.addEventListener("click", () => {
      $roomCreate.style.display = "none";
      $roomDisplay.style.display = "flex";
    });

    $createJoin.addEventListener("click", async () => {
      const name = ($roomInp.value || "").trim();
      if (!name) return;
      await joinAndLoad(name);
      const url = new URL(location.href);
      url.searchParams.set("room", name);
      history.replaceState(null, "", url.toString());
      $roomCreate.style.display = "none";
      $roomDisplay.style.display = "flex";
      showToast(`Joined: ${name}`, "success");
    });

    $roomSel.addEventListener("change", async () => {
      await joinAndLoad($roomSel.value);
      const url = new URL(location.href);
      url.searchParams.set("room", $roomSel.value);
      history.replaceState(null, "", url.toString());
    });

    $share.addEventListener("click", async () => {
      const code = currentRoomCode();
      if (!code) { showToast("Join a room first", "warning"); return; }
      const url = new URL(location.href);
      url.searchParams.set("room", code);
      await navigator.clipboard.writeText(url.toString());
      showToast("Link copied!", "success");
    });

    $deleteRoom.addEventListener("click", async () => {
      const code = currentRoomCode();
      if (!code) {
        if (!confirm("Clear all local data?")) return;
        localStorage.removeItem("bhq-rooms-v1");
        location.reload();
        return;
      }
      if (!confirm(`Delete room "${code}" for everyone?`)) return;
      try { await deleteRoom(code); showToast(`Room "${code}" deleted`, "success"); }
      catch (e) { console.error(e); showToast("Failed to delete", "warning"); }
      const url = new URL(location.href);
      url.searchParams.delete("room");
      location.href = url.toString();
    });

    // ---- Load guide ----
    const guideJsonUrl = (noCache = false) => {
      const u = new URL("data/guide.json", location.href);
      if (noCache) u.searchParams.set("ts", Date.now());
      return u.toString();
    };

    function extractDateFromUrl(url) {
      const match = url.match(/(\d{1,2})\.(\d{1,2})\.(\d{2})/);
      if (!match) return null;
      const date = new Date(2000 + parseInt(match[3]), parseInt(match[1]) - 1, parseInt(match[2]));
      return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function updateGuideLink(meta) {
      const u = (meta && meta.url) ? String(meta.url) : "";
      if (!u) { $pdfLink.style.display = "none"; updateSermonDate(null); updateSermonTitle(null); return; }
      const isPdf = u.toLowerCase().endsWith(".pdf");
      $pdfLink.textContent = isPdf ? "Open PDF" : "Source";
      $pdfLink.href = u;
      $pdfLink.style.display = "inline-block";
      const dateStr = extractDateFromUrl(u);
      updateSermonDate(dateStr);
      updateSermonTitle(meta.title || null);
      savePdfLink(u, dateStr, meta.title || "");
    }

    async function loadGuideJson(noCache = false) {
      try {
        const res = await fetch(guideJsonUrl(noCache), { cache: noCache ? "no-store" : "default" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        updateGuideLink(data);
        const next = [
          ...(data.questions || []).map((q, i) => ({
            id: stableId(q, i),
            type: "question",
            text: q,
            status: "active",
            source: "pdf"
          })),
          ...(data.sections || []).map((s, i) => ({
            id: stableId(s.body, 1000 + i),
            type: "section",
            title: s.title,
            text: s.body,
            status: "active",
            source: "pdf"
          }))
        ];
        await renderCards(next);
        autoSave();
        showToast(`Loaded ${next.length} cards`, "success");
      } catch (e) {
        console.error(e);
        showToast("Failed to load guide", "warning");
      }
    }

    $loadLatest.addEventListener("click", () => {
      if (!confirm("This will replace the current board. Continue?")) return;
      loadGuideJson(false);
    });

    $emptyLoadBtn.addEventListener("click", () => loadGuideJson(false));

    $refresh.addEventListener("click", () => {
      if (!confirm("Refresh will overwrite current changes. Continue?")) return;
      loadGuideJson(true);
    });

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[m]));
    }
  </script>
</body>
</html>
